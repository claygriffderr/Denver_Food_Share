{% extends 'base.html' %}

{% block content %}
    <h2>Share a Meal</h2>
    <p>What do you have to offer the neighborhood?</p>
    
    <div style="background: #e8f5e9; padding: 20px; border-radius: 8px; border: 1px solid #c8e6c9; max-width: 500px;">
        <form method="POST" action="/create_post" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 15px;">
            
            <label for="title" style="color: #2e7d32; font-weight: bold;">Title (e.g., Extra Lasagna)</label>
            <input type="text" id="title" name="title" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            
            <label for="description" style="color: #2e7d32; font-weight: bold;">Description</label>
            <textarea id="description" name="description" rows="4" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit;"></textarea>
            
            <label for="meal_photo" style="color: #2e7d32; font-weight: bold;">Upload a Photo (Optional)</label>
            <input type="file" id="meal_photo" name="meal_photo" accept="image/*" style="padding: 5px;">
            
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="is_refrigerated" name="is_refrigerated">
                <label for="is_refrigerated" style="color: #2e7d32; font-weight: bold;">This item is refrigerated/frozen</label>
            </div>
            
            <button type="submit" style="background-color: #2e7d32; color: white; padding: 12px; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px;">
                Post to Bulletin Board
            </button>
        </form>
    </div>
{% endblock %}
