{% extends 'base.html' %}

{% block content %}
    <h2>Message {{ receiver.username }}</h2>
    <p>Coordinate a pickup time or ask a question about their post.</p>
    
    <div style="background: #e8f5e9; padding: 20px; border-radius: 8px; border: 1px solid #c8e6c9; max-width: 500px;">
        <form method="POST" action="/send_message/{{ receiver.id }}" style="display: flex; flex-direction: column; gap: 15px;">
            
            <label for="content" style="color: #2e7d32; font-weight: bold;">Your Message</label>
            <textarea id="content" name="content" rows="5" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit;"></textarea>
            
            <button type="submit" style="background-color: #2e7d32; color: white; padding: 12px; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px;">
                Send Secure Message
            </button>
        </form>
    </div>
{% endblock %}
